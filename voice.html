<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>My Voice Note ❤️</title>
<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Poppins:wght@300;500&display=swap" rel="stylesheet">
<style>
html, body {
  margin:0; padding:0; width:100%; height:100%; overflow:hidden;
  font-family:'Poppins', sans-serif;
  background: radial-gradient(circle at bottom, #1a0033 0%, #000000 80%);
  color:white;
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
}

/* Decorative background doodles */
#decorativeBackground{
  position:absolute;
  top:0; left:0; width:100%; height:100%;
background: #fdf3e7 url('https://www.transparenttextures.com/patterns/paper-fibers.png') repeat;  background-repeat: repeat;
  opacity: 0.1;
  z-index:0;
}

/* Voice note card */
#voiceCard{
  position:relative;
  z-index:2;
  background: rgba(255,192,203,0.2);
  backdrop-filter: blur(20px);
  padding: 40px 50px;
  border-radius: 30px;
  text-align:center;
  max-width:500px;
  box-shadow:0 25px 60px rgba(255,182,193,0.25);
  animation: bounceIn 1s ease;
}

/* Header */
#voiceCard h1{
  font-family:'Great Vibes', cursive;
  font-size:50px;
  color:#ffe6f0;
  margin-bottom:30px;
  text-shadow: 0 0 20px #fff, 0 0 50px #ff99dd;
  animation: softPulse 4s ease-in-out infinite;
}

/* Cute audio player */
audio{
  width: 100%;
  outline:none;
  border-radius: 20px;
  box-shadow: 0 5px 20px rgba(255,153,221,0.3);
}

/* Back button */
#backBtn{
  margin-top:30px;
  padding: 12px 30px;
  font-size: 1rem;
  border: none;
  border-radius: 30px;
  background: #ff4d88;
  color: white;
  cursor: pointer;
  transition: all 0.3s ease;
}
#backBtn:hover{
  background: #ff1a66;
  transform: scale(1.05);
}

/* Animations */
@keyframes bounceIn {
  0% { transform: scale(0.5); opacity: 0; }
  60% { transform: scale(1.1); opacity: 1; }
  80% { transform: scale(0.95); }
  100% { transform: scale(1); }
}

@keyframes softPulse{
  0% { transform: scale(1); }
  50% { transform: scale(1.05); }
  100% { transform: scale(1); }
}
</style>
</head>
<body>

<div id="decorativeBackground"></div>

<div id="voiceCard">
  <h1>A Special Message For A Special Person ❤️</h1>
  <audio controls>
    <source src="voicenote.mp3" type="audio/mpeg">
    Your browser does not support the audio element.
  </audio>
  <button id="backBtn" onclick="window.history.back()">Back to Memories 💌</button>
</div>

</body>
</html>
